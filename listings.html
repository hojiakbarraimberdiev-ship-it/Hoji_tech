<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Объявления — Hoji.Tech</title>
  <meta name="description" content="Объявления по продаже ноутбуков и компьютеров на Hoji.Tech">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header" id="header">
    <div class="container header__inner">
      <a href="index.html" class="header__logo"><span class="logo-icon">⟨/⟩</span><span class="logo-text">Hoji<span class="accent">.Tech</span></span></a>
      <nav class="header__nav" id="mainNav">
        <a href="catalog.html" class="nav-link">Каталог</a>
        <a href="about.html" class="nav-link">О нас</a>
        <a href="contacts.html" class="nav-link">Контакты</a>
        <a href="brands.html" class="nav-link">Бренды</a>
        <a href="listings.html" class="nav-link active">Объявления</a>
      </nav>
      <div class="header__actions">
        <button class="btn-icon theme-toggle" id="themeToggle" aria-label="Переключить тему"><span class="theme-icon">◑</span></button>
        <a href="cart.html" class="btn-icon cart-btn" aria-label="Корзина"><span class="cart-icon">◫</span><span class="cart-badge" id="cartBadge" style="display:none">0</span></a>
        <a href="login.html" class="btn-icon" id="authBtn" aria-label="Войти"><span>◎</span></a>
        <button class="btn-icon burger" id="burger" aria-label="Меню"><span></span><span></span><span></span></button>
      </div>
    </div>
  </header>

  <main class="catalog-page">
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">Объявления</h1>
        <p class="page-subtitle">Добавляй и покупай ноутбуки и компьютеры от реальных пользователей.</p>
      </div>

      <div class="catalog-search">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input type="search" id="listingSearch" class="search-input" placeholder="Поиск объявлений..." autocomplete="off">
          <button class="search-clear" id="listingSearchClear" style="display:none">✕</button>
        </div>
      </div>

      <div class="catalog-toolbar">
        <div class="catalog-count">Найдено: <span id="listingsCount">0</span> объявлений</div>
        <div class="catalog-sort">
          <label for="listingSortSelect">Сортировка:</label>
          <select id="listingSortSelect" class="sort-select">
            <option value="recent">Сначала новые</option>
            <option value="price_asc">Цена: по возрастанию</option>
            <option value="price_desc">Цена: по убыванию</option>
          </select>
        </div>
      </div>

      <div class="section-actions">
        <a href="sell.html" class="btn btn--primary btn--lg">+ Подать объявление</a>
      </div>

      <div id="listingsEmpty" class="catalog-empty" style="display:none; margin-top:40px;">
        <div class="empty-icon">📬</div>
        <h3>Здесь пока нет объявлений</h3>
        <p>Будьте первым, кто разместит своё предложение.</p>
        <a href="sell.html" class="btn btn--primary">Добавить объявление</a>
      </div>
      <div id="listingsGrid" class="products-grid"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer__bottom"><div class="container"><span>© 2026 Hoji.tech</span></div></div>
  </footer>
  <div class="toast-container" id="toastContainer"></div>
  <div class="nav-overlay" id="navOverlay"></div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
